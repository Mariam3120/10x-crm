<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients · 10X CRM</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">

    <!-- Shared sidebar (identical to dashboard) -->
    <aside class="sidebar">
      <a href="dashboard.html" class="logo">10X<span class="logo__accent">CRM</span></a>

      <nav class="nav" aria-label="Main navigation">
        <a href="dashboard.html" class="nav__link">Dashboard</a>
        <a href="clients.html" class="nav__link">Clients</a>
        <a href="profile.html" class="nav__link">Profile</a>
      </nav>

      <div class="sidebar__footer">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark and light theme">🌙</button>
        <button id="logout-btn" class="btn btn--ghost" type="button">Log Out</button>
      </div>
    </aside>

    <main class="app__main">

      <!-- Page header -->
      <header class="page__header">
        <h1 class="page__title">Clients</h1>
        <button id="add-client-btn" class="btn btn--primary" type="button">+ Add Client</button>
      </header>

      <!-- Toolbar: search + filter chips + sort   -->
      <section class="toolbar" aria-label="Client filters">
        <input
          type="search"
          id="search-input"
          class="form__input toolbar__search"
          placeholder="Search by name or company..."
          aria-label="Search clients"
        />

        <div class="chips" role="group" aria-label="Filter by status">
          <button class="chip chip--active" type="button" data-status="All">All</button>
          <button class="chip" type="button" data-status="Lead">Lead</button>
          <button class="chip" type="button" data-status="Contacted">Contacted</button>
          <button class="chip" type="button" data-status="Won">Won</button>
          <button class="chip" type="button" data-status="Lost">Lost</button>
        </div>

        <select id="sort-select" class="form__input toolbar__sort" aria-label="Sort clients">
          <option value="newest">Newest first</option>
          <option value="name">Name A→Z</option>
          <option value="deal">Deal value: high → low</option>
        </select>
      </section>

      <!-- Clients list!!!! JS renders the cards in here -->
      <section id="clients-list" class="clients" aria-live="polite">
        <p class="clients__message">Loading clients...</p>
      </section>

    </main>
  </div>

  <!-- =============CLIENT MODAL=============== -->
  <div id="add-client-modal" class="modal" hidden>
    <div class="modal__backdrop" data-close-modal></div>

    <div class="modal__box" role="dialog" aria-modal="true" aria-labelledby="add-client-title">
      <header class="modal__header">
        <h2 id="add-client-title" class="modal__title">Add Client</h2>
        <button class="modal__close" type="button" data-close-modal aria-label="Close dialog">✕</button>
      </header>

      <form id="add-client-form" class="form" novalidate>

        <div class="form__group">
          <label for="client-name" class="form__label">Name</label>
          <input type="text" id="client-name" name="name" class="form__input"
                 placeholder="Emily Johnson" aria-describedby="client-name-error" required />
          <p id="client-name-error" class="form__error" aria-live="polite"></p>
        </div>

        <div class="form__group">
          <label for="client-email" class="form__label">Email</label>
          <input type="email" id="client-email" name="email" class="form__input"
                 placeholder="emily@company.com" aria-describedby="client-email-error" required />
          <p id="client-email-error" class="form__error" aria-live="polite"></p>
        </div>

        <div class="form__group">
          <label for="client-phone" class="form__label">Phone</label>
          <input type="tel" id="client-phone" name="phone" class="form__input"
                 placeholder="+995 555 123 456" aria-describedby="client-phone-error" />
          <p id="client-phone-error" class="form__error" aria-live="polite"></p>
        </div>

        <div class="form__group">
          <label for="client-company" class="form__label">Company</label>
          <input type="text" id="client-company" name="company" class="form__input"
                 placeholder="Company (optional)" />
        </div>

        <div class="form__group">
          <label for="client-deal" class="form__label">Deal Value ($)</label>
          <input type="number" id="client-deal" name="dealValue" class="form__input"
                 placeholder="5000" aria-describedby="client-deal-error" required />
          <p id="client-deal-error" class="form__error" aria-live="polite"></p>
        </div>

        <div class="form__group">
          <label for="client-status" class="form__label">Status</label>
          <select id="client-status" name="status" class="form__input">
            <option value="Lead" selected>Lead</option>
            <option value="Contacted">Contacted</option>
            <option value="Won">Won</option>
            <option value="Lost">Lost</option>
          </select>
        </div>

        <button type="submit" class="btn btn--primary btn--block">Add Client</button>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <script type="module" src="js/clients.js"></script>
</body>
</html>
