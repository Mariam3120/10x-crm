<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · 10X CRM</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark and light theme">🌙</button>

  <main class="auth">
    <section class="auth-card">
      <h1 class="auth-card__title">Dashboard</h1>
      <p class="auth-card__subtitle">You are logged in 🎉 (real dashboard coming next)</p>
      <button id="logout-btn" class="btn btn--primary btn--block" type="button">Log Out</button>
    </section>
  </main>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
